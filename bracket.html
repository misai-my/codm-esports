<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Championship Bracket · CODM Tournament OS</title><link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/premium-polish.css" /></head><body>
<header class="nav"><div class="container nav-inner"><a class="brand" href="index.html"><span class="brand-emblem"><img data-asset="logo" alt="CODM Tournament OS" /></span><span class="brand-title">CODM Tournament OS<small>Championship Bracket</small></span></a><nav class="nav-links"><a class="nav-link" href="index.html">Home</a><a class="nav-link" href="register.html">Register</a><a class="nav-link" href="rules.html">Rules</a><a class="nav-link" href="matches.html">My Matches</a></nav></div></header>
<main><section class="page-hero" data-hero-bg><div class="container"><div class="eyebrow">Championship Bracket</div><h1 class="h1"><span class="gradient-text">The road is set.</span><br/>Every match matters.</h1><p class="lead" id="tournamentMeta">Loading tournament...</p></div></section><section class="section"><div class="container"><div class="section-heading"><div><div class="eyebrow" id="formatLabel">Official Bracket</div><h2>Competition View</h2></div><button class="btn" id="refreshBtn">Refresh View</button></div><div id="standingsWrap" class="section-tight"></div><div id="bracketWrap" class="grid"></div></div></section></main><div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/main.js"></script><script>
let tournament=null,teamMap={};function teamName(id){const t=teamMap[id];return t?`${t.team_name} (${t.team_tag||''})`:'TBD'}function teamLine(id,score,winner){const t=teamMap[id];if(!t)return `<div class="match-team empty"><span>TBD</span><strong>-</strong></div>`;return `<div class="match-team ${winner?'winner':''}"><div class="team-card">${teamLogoHtml(t,'sm')}<div><strong>${escapeHtml(t.team_name)}</strong><div class="small">${escapeHtml(t.team_tag||'')}</div></div></div><strong>${score??0}</strong></div>`}async function loadTeams(ids){teamMap={};if(!ids.length)return;const {data,error}=await window.sb.from('teams').select('id,team_name,team_tag,logo_url').in('id',ids);if(error)throw error;teamMap=Object.fromEntries((data||[]).map(t=>[t.id,t]))}function renderStandings(rows){if(!rows.length){qs('#standingsWrap').innerHTML='';return}qs('#standingsWrap').innerHTML=`<div class="card"><div class="section-heading"><div><div class="eyebrow">Standings</div><h2>Table</h2></div></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>Pts</th><th>Maps</th><th>Buchholz</th><th>Status</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>${teamName(r.team_id)}</td><td>${r.wins}</td><td>${r.losses}</td><td>${r.points}</td><td>${r.map_wins}-${r.map_losses}</td><td>${r.buchholz||0}</td><td>${statusBadge(r.status)}</td></tr>`).join('')}</tbody></table></div></div>`}function renderMatches(matches){const wrap=qs('#bracketWrap');if(!matches.length){wrap.innerHTML='<div class="notice">No bracket or Swiss round generated yet.</div>';return}const grouped=matches.reduce((acc,m)=>{const key=m.round_label||`Round ${m.round_no}`;acc[key] ||= [];acc[key].push(m);return acc},{});wrap.innerHTML=Object.entries(grouped).map(([label,roundMatches])=>`<section class="card"><div class="section-heading"><div><div class="eyebrow">${escapeHtml(label)}</div><h2>${roundMatches.length} Match${roundMatches.length>1?'es':''}</h2></div></div><div class="grid grid-two">${roundMatches.map(m=>`<article class="card card-flat"><div class="match-card-top">${statusBadge(m.status)}<span class="small">${escapeHtml(m.bracket_group)} · Match ${m.match_no}</span></div>${teamLine(m.team_a_id,m.team_a_series_score,m.winner_team_id===m.team_a_id)}${teamLine(m.team_b_id,m.team_b_series_score,m.winner_team_id===m.team_b_id)}${m.winner_team_id?`<p class="small">Winner: ${escapeHtml(teamName(m.winner_team_id))}</p>`:''}</article>`).join('')}</div></section>`).join('')}async function loadPublic(){try{tournament=await loadDefaultTournament();setText('#tournamentMeta',`${tournament.title} · ${bracketTypeLabel(tournament.bracket_type)} · ${tournament.format} · Round ${tournament.current_round||0}`);setText('#formatLabel',bracketTypeLabel(tournament.bracket_type));const {data:matches,error}=await window.sb.from('matches').select('*').eq('tournament_id',tournament.id).order('round_no',{ascending:true}).order('match_no',{ascending:true});if(error)throw error;const {data:standings,error:standingsError}=await window.sb.from('tournament_standings').select('*').eq('tournament_id',tournament.id).order('points',{ascending:false}).order('wins',{ascending:false}).order('map_diff',{ascending:false}).order('seed',{ascending:true});if(standingsError)throw standingsError;const ids=[...(matches||[]).flatMap(m=>[m.team_a_id,m.team_b_id,m.winner_team_id]),...(standings||[]).map(s=>s.team_id)].filter(Boolean);await loadTeams([...new Set(ids)]);renderStandings(standings||[]);renderMatches(matches||[])}catch(err){console.error(err);showToast(err.message||'Failed to load bracket.','error')}}qs('#refreshBtn').addEventListener('click',loadPublic);loadPublic();
</script>  <script src="assets/js/premium-copy.js"></script>
</body></html>
