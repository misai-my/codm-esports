<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bracket · CODM Tournament OS</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <span class="brand-emblem">M</span>
        <span class="brand-title">CODM Tournament OS<small>Public Bracket</small></span>
      </a>
      <nav class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="register.html">Register</a>
        <a class="nav-link" href="matches.html">My Matches</a>
        <a class="nav-link" href="admin_bracket.html">Bracket Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero" data-hero-bg>
      <div class="container">
        <div class="eyebrow">Live Bracket</div>
        <h1 class="h1"><span class="gradient-text">Road to finals.</span><br/>One match at a time.</h1>
        <p class="lead" id="tournamentMeta">Loading tournament...</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <div class="eyebrow">Single Elimination</div>
            <h2>Bracket View</h2>
            <p>Generated from approved teams by the organizer.</p>
          </div>
          <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
        </div>
        <div id="bracketWrap" class="grid"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    let tournament = null;

    function roundName(roundNo, maxRound) {
      if (roundNo === maxRound) return "Grand Final";
      if (roundNo === maxRound - 1) return "Semifinals";
      if (roundNo === maxRound - 2) return "Quarterfinals";
      return `Round ${roundNo}`;
    }

    function teamLine(team, score, isWinner) {
      if (!team) {
        return `<div class="match-team empty"><span class="small">TBD</span><strong>-</strong></div>`;
      }
      return `
        <div class="match-team ${isWinner ? "winner" : ""}">
          <div class="team-card">
            ${teamLogoHtml(team, "sm")}
            <div><strong>${escapeHtml(team.team_name)}</strong><div class="small">${escapeHtml(team.team_tag || "")}</div></div>
          </div>
          <strong>${score ?? 0}</strong>
        </div>`;
    }

    async function loadBracket() {
      try {
        tournament = await loadDefaultTournament();
        setText("#tournamentMeta", `${tournament.title} · ${tournament.game} · ${tournament.format}`);

        const { data: matches, error } = await window.sb
          .from("matches")
          .select("*")
          .eq("tournament_id", tournament.id)
          .order("round_no", { ascending: true })
          .order("match_no", { ascending: true });
        if (error) throw error;

        const wrap = qs("#bracketWrap");
        if (!matches.length) {
          wrap.innerHTML = `<div class="notice">No bracket generated yet. Ask the organizer to generate the bracket from approved teams.</div>`;
          return;
        }

        const teamIds = [...new Set(matches.flatMap(m => [m.team_a_id, m.team_b_id, m.winner_team_id]).filter(Boolean))];
        let teamMap = {};
        if (teamIds.length) {
          const { data: teams, error: teamsError } = await window.sb
            .from("teams")
            .select("id, team_name, team_tag, logo_url")
            .in("id", teamIds);
          if (teamsError) throw teamsError;
          teamMap = Object.fromEntries((teams || []).map(t => [t.id, t]));
        }

        const maxRound = Math.max(...matches.map(m => m.round_no));
        const grouped = matches.reduce((acc, match) => {
          acc[match.round_no] ||= [];
          acc[match.round_no].push(match);
          return acc;
        }, {});

        wrap.innerHTML = Object.keys(grouped).map(roundNoRaw => {
          const roundNo = Number(roundNoRaw);
          const roundMatches = grouped[roundNo];
          return `
            <section class="card">
              <div class="section-heading">
                <div><div class="eyebrow">${roundName(roundNo, maxRound)}</div><h2>${roundMatches.length} Match${roundMatches.length > 1 ? "es" : ""}</h2></div>
              </div>
              <div class="grid grid-two">
                ${roundMatches.map(match => {
                  const teamA = teamMap[match.team_a_id];
                  const teamB = teamMap[match.team_b_id];
                  const winnerId = match.winner_team_id;
                  return `
                    <article class="card card-flat match-card">
                      <div class="match-card-top"><span class="badge badge-${escapeHtml(match.status)}">${escapeHtml(match.status)}</span><span class="small">Match ${match.match_no}</span></div>
                      ${teamLine(teamA, match.team_a_series_score, winnerId && winnerId === match.team_a_id)}
                      ${teamLine(teamB, match.team_b_series_score, winnerId && winnerId === match.team_b_id)}
                    </article>`;
                }).join("")}
              </div>
            </section>`;
        }).join("");
      } catch (err) {
        console.error(err);
        showToast(err.message || "Failed to load bracket.", "error");
      }
    }

    qs("#refreshBtn").addEventListener("click", loadBracket);
    loadBracket();
  </script>
</body>
</html>
